name: Release Readiness

on:
  pull_request:
    branches:
      - master
      - release
  push:
    branches:
      - master
      - release

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint